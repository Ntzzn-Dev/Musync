name: musync_and
description: "Um aplicativo mobile com capacidade de organizar musicas locais, reproduzi-las, baixar e transferir as musicas entre plataformas."
publish_to: "none" 
version: 5.16.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.1
  just_audio: ^0.9.36
  http: ^1.4.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  audio_service: ^0.18.18
  on_audio_query:
    path: plugins/on_audio_query-2.9.0
  intl: ^0.20.2
  sqflite: ^2.4.2
  path: ^1.9.1
  scrollable_positioned_list: ^0.3.8
  audiotags: ^1.4.5
  ffmpeg_kit_flutter_new: ^3.2.0
  share_plus: ^11.0.0
  web_socket_channel: ^3.0.3
  volume_controller: ^2.0.5
  mobile_scanner: ^7.1.3
  diacritic: ^0.1.3
  youtube_explode_dart: ^3.0.5
  youtube_explode_webview: ^0.0.2

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/musync_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/dice.png

  fonts:
    - family: Digital
      fonts:
        - asset: assets/fonts/digital-7.ttf
    - family: Titles
      fonts:
        - asset: assets/fonts/Moderniz.otf
    - family: Default-Thin
      fonts:
        - asset: assets/fonts/ZTNature-Thin.ttf
    - family: Default-Medium
      fonts:
        - asset: assets/fonts/ZTNature-Medium.ttf